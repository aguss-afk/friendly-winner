<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>Mi To-Do List</h1>

    <div class="input-container">
      <input type="text" placeholder="Escribe una tarea..." />
      <button>Agregar</button>
    </div>

    <ul class="task-list">
      <li class="task">
        <span>Ejemplo de tarea</span>
        <button>✔</button>
        <button>🗑</button>
      </li>
    </ul>
  </div>

</body>
</html>
