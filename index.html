<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>To-Do List</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="app">
    <h1>📝 Mi To-Do List</h1>

    <div class="input-container">
      <input
       id="task-input"
       type="text"
       placeholder="¿Qué necesitas hacer hoy?"
      />
      <button id="add-btn">Agregar</button>
    </div>

    <div class="filters">
      <button data-filter="all" class="active">Todas</button>
      <button data-filter="pending">Pendientes</button>
      <button data-filter="completed">Completadas</button>
    </div>

    <p class="task-counter">Tareas pendientes: 0</p>
 
    <ul id="tasklist" class="task-list"></ul>
  </div>

  <script>
    const STORAGE_KEY = 'friendly-winner-tasks';
    const taskInput = document.getElementById('task-input');
    const addBtn = document.getElementById('add-btn');
    const taskList = document.getElementById('tasklist');
    const taskCounter = document.querySelector('.task-counter');
    const filterButtons = document.querySelectorAll('.filters button');

    let tasks = loadTasks();
    let currentFilter = 'all';

    function loadTasks() {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) {
        return [];
      }

      try {
        return JSON.parse(raw) || [];
      } catch (error) {
        console.warn('Error leyendo tareas desde localStorage:', error);
        return [];
      }
    }

    function saveTasks() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
    }

    function renderTasks() {
      taskList.innerHTML = '';
      const filteredTasks = tasks.filter(task => {
        if (currentFilter === 'pending') return !task.completed;
        if (currentFilter === 'completed') return task.completed;
        return true;
      });

      if (filteredTasks.length === 0) {
        const emptyItem = document.createElement('li');
        emptyItem.className = 'task';
        emptyItem.style.justifyContent = 'center';
        emptyItem.textContent = 'No hay tareas para mostrar';
        taskList.appendChild(emptyItem);
      } else {
        filteredTasks.forEach(task => {
          const li = document.createElement('li');
          li.className = `task${task.completed ? ' completed' : ''}`;

          const text = document.createElement('span');
          text.className = 'task-text';
          text.textContent = task.text;

          const completeBtn = document.createElement('button');
          completeBtn.className = 'complete-btn';
          completeBtn.type = 'button';
          completeBtn.title = task.completed ? 'Desmarcar completado' : 'Marcar como completado';
          completeBtn.textContent = '✔';
          completeBtn.addEventListener('click', () => {
            toggleComplete(task.id);
          });

          const deleteBtn = document.createElement('button');
          deleteBtn.className = 'delete-btn';
          deleteBtn.type = 'button';
          deleteBtn.title = 'Eliminar tarea';
          deleteBtn.textContent = '🗑';
          deleteBtn.addEventListener('click', () => {
            deleteTask(task.id);
          });

          li.appendChild(text);
          li.appendChild(completeBtn);
          li.appendChild(deleteBtn);
          taskList.appendChild(li);
        });
      }

      updateCounter();
    }

    function updateCounter() {
      const pendingCount = tasks.filter(task => !task.completed).length;
      taskCounter.textContent = `Tareas pendientes: ${pendingCount}`;
    }

    function addTask() {
      const text = taskInput.value.trim();
      if (text === '') return;

      const nextId = tasks.length > 0 ? Math.max(...tasks.map(task => task.id)) + 1 : 1;
      tasks.push({ id: nextId, text, completed: false });
      taskInput.value = '';
      saveTasks();
      renderTasks();
    }

    function toggleComplete(id) {
      tasks = tasks.map(task =>
        task.id === id ? { ...task, completed: !task.completed } : task
      );
      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      renderTasks();
    }

    function updateFilter(selectedFilter) {
      currentFilter = selectedFilter;
      filterButtons.forEach(button => {
        button.classList.toggle('active', button.dataset.filter === selectedFilter);
      });
      renderTasks();
    }

    addBtn.addEventListener('click', addTask);
    taskInput.addEventListener('keydown', event => {
      if (event.key === 'Enter') {
        addTask();
      }
    });

    filterButtons.forEach(button => {
      button.addEventListener('click', () => {
        updateFilter(button.dataset.filter);
      });
    });

    renderTasks();
  </script>
</body>
</html>
