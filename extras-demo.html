<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Demo - Extras (Filtros, Búsqueda y Dark Mode)</title>
  <link rel="stylesheet" href="extras.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>To-Do List - Extras Demo</h1>
      <p class="subtitle">Vista previa de filtros, buscador y modo oscuro</p>
    </header>

    <!-- Sección de filtros -->
    <section class="filters-section">
      <h2>Filtros</h2>
      <div class="filters">
        <button class="filter-btn active" data-filter="all">Todas</button>
        <button class="filter-btn" data-filter="pending">Pendientes</button>
        <button class="filter-btn" data-filter="completed">Completadas</button>
      </div>
    </section>

    <!-- Aquí más adelante se conectará con el resto del proyecto -->
  </div>

  <script type="module" src="services/filters.js"></script>
</body>
</html>
